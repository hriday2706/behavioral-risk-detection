<!DOCTYPE html>
<html>
<head>
    <title>Demo Bank - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Welcome to Demo Bank</h2>

        <!-- Core Banking Actions -->
        <button id="viewBtn">View Dashboard</button>
        <button id="downloadBtn">Download Statement</button>
        <button id="passwordBtn">Change Password</button>

        <hr>

        <!-- Behavior Simulation Panel -->
        <h3>Behavior Simulation Panel</h3>

        <button id="normalModeBtn">Normal Browse Mode</button>
        <button id="attackModeBtn">Immediate Attack Mode</button>
        <button id="rapidActionBtn">Rapid Sensitive Actions (x3)</button>

        <hr>

        <!-- Risk Display -->
        <h3>Risk Status</h3>
        <pre id="riskDisplay">No risk calculated yet.</pre>

    </div>

    <script src="script.js"></script>
</body>
</html>
