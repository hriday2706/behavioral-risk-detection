<!DOCTYPE html>
<html>
<head>
    <title>Demo Bank - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Demo Bank</h2>

        <button id="viewBtn">Dashboard</button>
        <button id="transactionsBtn">Transactions</button>
        <button id="profileBtn">Profile</button>
        <button id="loanBtn">Loans</button>

        <hr>

        <button id="downloadBtn" class="sensitive">Download Statement</button>
        <button id="passwordBtn" class="sensitive">Change Password</button>
        <button id="transferBtn" class="sensitive">Transfer Funds</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h1>Welcome Back</h1>

        <div class="card">
            <h3>Account Balance</h3>
            <p>₹ 4,52,340.00</p>
        </div>

        <div class="card">
            <h3>Recent Activity</h3>
            <div class="card">
                <h3>Behavior Timeline</h3>
                <ul id="activityFeed" class="timeline"></ul>
            </div>

        </div>
    </div>

    <!-- RISK PANEL -->
    <div class="risk-panel">
        <h3>Live Risk Monitor</h3>

        <div id="securityAlert" style="display:none; color:white; background:red; padding:10px; border-radius:5px;">
            ⚠ Additional Verification Required
        </div>

        <div class="risk-bar-container">
            <div id="riskBar" class="risk-bar"></div>
        </div>

        <p id="riskText">Risk: LOW (0)</p>
        <div id="riskReasons"></div>
    </div>


</div>

<script type="module" src="js/dashboard.js"></script>

</body>
</html>
